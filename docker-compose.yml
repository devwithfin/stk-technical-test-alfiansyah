version: "3.9"

services:
  backend:
    build: ./backend
    command: sh -c "npx prisma migrate deploy && npm run start:dev"
    container_name: nest_backend
    ports:
      - "3000:3000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
    depends_on:
      - db
    mem_limit: 512m

  frontend:
    build: ./app
    container_name: react_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./app:/app
      - /app/node_modules
    stdin_open: true
    mem_limit: 512m

  db:
    image: postgres:15
    container_name: postgres_db
    restart: always
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: stk
    volumes:
      - pgdata:/var/lib/postgresql/data
    mem_limit: 256m

volumes:
  pgdata: